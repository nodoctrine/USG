  <div id="screen-results" hidden>
    <div class="results-hero">
      <div class="score-display" id="score-display"></div>

'use strict';

// ── QUESTION POOL ─────────────────────────────────────────────────
const QUESTIONS = [
  { id:'q26', topic:'Bit Manipulation', chapter:0,
    text:'What is the result of <code>0b10110100 &amp; 0b00001111</code>?',
    choices:{a:'<code>0b10111111</code>',b:'<code>0b00000100</code>',c:'<code>0b10110000</code>',d:'<code>0b10110100</code>'}, correct:'b',
    mistakes:{a:'OR combines bits from both operands — AND does not. AND keeps a bit only where both inputs are 1. The upper nibble of the mask is 0000, so the entire upper nibble is forced to 0.',
              c:'That result would come from ANDing with 0b11110000, not 0b00001111. The mask here keeps the lower nibble, not the upper.'},
    explanation:'AND keeps bits only where both inputs are 1. Upper nibble: <code>1011 &amp; 0000 = 0000</code>. Lower nibble: <code>0100 &amp; 1111 = 0100</code>. Result: <code>0b00000100</code>.' },

  { id:'q27', topic:'Bit Manipulation', chapter:0,
    text:'Which expression correctly <strong>clears</strong> bit 5 of variable <code>x</code> without affecting other bits?',
    choices:{a:'<code>x |= (1 &lt;&lt; 5)</code>',b:'<code>x ^= (1 &lt;&lt; 5)</code>',c:'<code>x &amp;= ~(1 &lt;&lt; 5)</code>',d:'<code>x = ~(1 &lt;&lt; 5)</code>'}, correct:'c',
    mistakes:{a:'|= sets bits, it does not clear them. OR can only turn a bit on — once a bit is 1, ORing with 1 keeps it 1.',
              b:'^= toggles the bit — if it was 1 it becomes 0, but if it was 0 it becomes 1. That is not reliably clearing.',
              d:'This replaces the entire value of x with the inverted mask, destroying all other bits. Always use &= to read-modify-write.'},
    explanation:'<code>~(1&lt;&lt;5)</code> inverts the mask, giving all 1s except at bit 5. ANDing forces bit 5 to 0 while leaving all other bits untouched.' },

  { id:'q28', topic:'Bit Manipulation', chapter:0,
    text:'What does <code>(1 &lt;&lt; N)</code> produce?',
    choices:{a:'The value N multiplied by 2',b:'An integer with only bit N set to 1',c:'A mask with bits 0 through N all set to 1',d:'The value N shifted right by 1'}, correct:'b',
    explanation:'Left-shifting 1 by N places moves the single set bit to position N. <code>(1&lt;&lt;5) = 0b00100000</code> — only bit 5 is set. This is the standard way to build a bit mask.' },

  { id:'q29', topic:'Register Control', chapter:0,
    text:'Why must pointers to hardware registers be declared <code>volatile</code> in C?',
    choices:{a:'To make the register read-only',b:'To store the value in a CPU register for faster access',c:'To prevent the compiler from caching reads or eliminating writes that it considers redundant',d:'To reserve the memory address so no other variable can use it'}, correct:'c',
    mistakes:{a:'volatile does not make anything read-only — const does. volatile is purely about telling the compiler not to optimize around the variable.',
              b:'volatile has the opposite effect — it forces the compiler to read and write actual memory every time, not cache the value in a CPU register.'},
    explanation:'Hardware can change a register\'s value at any time (interrupts, peripherals). <code>volatile</code> tells the compiler to always re-read from and write to the real address, never assume the value is unchanged between accesses.' },

  { id:'q30', topic:'Register Control', chapter:0,
    text:'A control register holds <code>0b11001010</code>. You execute <code>REG = (1 &lt;&lt; 3);</code>. What does REG contain afterward?',
    choices:{a:'<code>0b11001010</code> — unchanged except bit 3 set',b:'<code>0b11001110</code> — bit 3 added safely',c:'<code>0b00001000</code> — all other bits zeroed',d:'<code>0b11000010</code> — bit 3 toggled'}, correct:'c',
    mistakes:{a:'A plain assignment does not preserve existing bits — it replaces the entire register. To add a bit safely you need |= not =.',
              b:'That result would require |= (read-modify-write). The plain = operator overwrites the register with exactly the right-hand value.'},
    explanation:'<code>REG = (1&lt;&lt;3)</code> is a plain assignment. It sets REG to exactly <code>0b00001000</code>, silently zeroing every other bit. The safe form is <code>REG |= (1&lt;&lt;3)</code>.' },

  { id:'q01', topic:'Variables & Types', chapter:1,
    text:'Which of these is a valid integer variable declaration in C?',
    choices:{a:'integer x = 5;',b:'int x = 5;',c:'x int = 5;',d:'Int x = 5;'}, correct:'b',
    explanation:'<code>int x = 5;</code> is correct. C is case-sensitive — <code>Int</code> is not a keyword.' },

  { id:'q02', topic:'Variables & Types', chapter:1,
    text:'Which data type would you use to store the value <strong>3.14159</strong> in C?',
    choices:{a:'int',b:'char',c:'float',d:'bool'}, correct:'c',
    explanation:'<code>float</code> (or <code>double</code> for more precision) stores decimal numbers.' },

  { id:'q03', topic:'Variables & Types', chapter:1,
    text:'What does the <code>char</code> data type store?',
    choices:{a:'Multiple characters',b:'A single character',c:'Boolean true/false',d:'Large integers'}, correct:'b',
    explanation:'<code>char</code> stores a <strong>single character</strong>, e.g. <code>char c = \'A\';</code>' },

  { id:'q04', topic:'Operators', chapter:1,
    text:'What does the <strong>%</strong> operator compute in C?',
    choices:{a:'Division result',b:'Percentage',c:'Remainder after division',d:'Exponentiation'}, correct:'c',
    mistakes:{a:'Division result is what the / operator returns. The % operator returns the remainder left over after integer division.',
              b:'The % symbol means percentage in everyday use, but in C it is the modulo operator — it returns the integer remainder after division. There is no percentage operator in C.'},
    explanation:'<code>%</code> is the <strong>modulo</strong> operator — it returns the remainder. Example: <code>17 % 5 = 2</code>' },

  { id:'q05', topic:'Operators', chapter:1,
    text:'What is the result of <code>17 % 5</code>?',
    choices:{a:'3',b:'2',c:'1',d:'0'}, correct:'b',
    mistakes:{a:'3 is the quotient — the result of 17 / 5. The % operator returns the remainder, not the quotient. 17 = 5 × 3 + 2, so 17 % 5 = 2.'},
    explanation:'17 ÷ 5 = 3 remainder <strong>2</strong>. So <code>17 % 5 = 2</code>.' },

  { id:'q06', topic:'Operators', chapter:1,
    text:'What does <code>printf("%d", 10 / 3)</code> output?',
    choices:{a:'3.33',b:'3',c:'4',d:'0'}, correct:'b',
    mistakes:{a:'3.33 would be correct for floating-point division, but both operands are integer literals here. C performs integer division when both sides are int types, truncating (not rounding) the result.',
              c:'C truncates toward zero — it does not round up. 10 / 3 = 3 remainder 1, so the result is 3, not 4.'},
    explanation:'In C, dividing two integers performs <strong>integer division</strong> — the decimal is truncated. 10 / 3 = <strong>3</strong>.' },

  { id:'q07', topic:'Operators', chapter:1,
    text:'What is the difference between <code>=</code> and <code>==</code> in C?',
    choices:{a:'No difference',b:'= compares, == assigns',c:'= assigns a value, == compares values',d:'== is only for strings'}, correct:'c',
    mistakes:{b:'That is the reverse. In C, = assigns a value (x = 5 stores 5 in x) and == tests equality (x == 5 checks whether x equals 5). Confusing them is one of the most common C bugs.'},
    explanation:'<code>=</code> is the <strong>assignment</strong> operator. <code>==</code> is the <strong>equality comparison</strong> operator. Confusing them is a common bug.' },

  { id:'q08', topic:'Operators', chapter:1,
    text:'After <code>int x = 5; x++;</code>, what is the value of <code>x</code>?',
    choices:{a:'4',b:'5',c:'6',d:'undefined'}, correct:'c',
    explanation:'<code>x++</code> (post-increment) increments <code>x</code> by 1. So x becomes <strong>6</strong>.' },

  { id:'q09', topic:'Syntax', chapter:1,
    text:'What character terminates a statement in C?',
    choices:{a:'Period (.)',b:'Comma (,)',c:'Colon (:)',d:'Semicolon (;)'}, correct:'d',
    mistakes:{a:'Periods end sentences in English, but C statements are terminated with a semicolon (;). Some languages like Python use newlines as implicit terminators, but C requires the semicolon explicitly.'},
    explanation:'Every C statement ends with a <strong>semicolon</strong>. Omitting it is one of the most common syntax errors.' },

  { id:'q10', topic:'Syntax', chapter:1,
    text:'What is the return type of <code>main()</code> in standard C?',
    choices:{a:'void',b:'char',c:'float',d:'int'}, correct:'d',
    explanation:'<code>main()</code> returns <strong>int</strong>. <code>return 0;</code> signals the program ended successfully.' },

  { id:'q11', topic:'Syntax', chapter:1,
    text:'Which symbol starts a single-line comment in C?',
    choices:{a:'--',b:'##',c:'//',d:'<!--'}, correct:'c',
    explanation:'<code>//</code> starts a single-line comment. <code>/* ... */</code> is used for multi-line comments.' },

  { id:'q12', topic:'Syntax', chapter:1,
    text:'Which header file must be included to use <code>printf</code> and <code>scanf</code>?',
    choices:{a:'math.h',b:'stdlib.h',c:'string.h',d:'stdio.h'}, correct:'d',
    mistakes:{a:'math.h provides mathematical functions like sqrt() and pow(). printf and scanf are input/output functions — they are defined in stdio.h (standard input/output).'},
    explanation:'<code>#include &lt;stdio.h&gt;</code> provides <strong>printf</strong> and <strong>scanf</strong> (standard input/output).' },

  { id:'q13', topic:'Syntax', chapter:1,
    text:'What does <code>\\n</code> do inside a string literal in C?',
    choices:{a:'Null terminator',b:'Tab character',c:'Newline character',d:'Prints a backslash'}, correct:'c',
    mistakes:{a:'The null terminator is \\0 (backslash zero), not \\n. \\0 marks the end of a string in C. \\n is the newline escape sequence.',
              b:'The tab character is \\t (backslash t). \\n moves the cursor to the beginning of the next line.'},
    explanation:'<code>\\n</code> is an <strong>escape sequence</strong> for a newline — it moves the cursor to the next line.' },

  { id:'q14', topic:'Input / Output', chapter:1,
    text:'What does <code>scanf("%d", &x)</code> do?',
    choices:{a:'Prints x to the screen',b:'Reads an integer from input into x',c:'Declares x as int',d:'Assigns 0 to x'}, correct:'b',

  { id:'q15', topic:'Input / Output', chapter:1,
    text:'What does <code>printf("%c", 65)</code> output?',

    explanation:'65 is the ASCII code for <strong>A</strong>. <code>%c</code> formats an integer as its ASCII character.' },

  { id:'q16', topic:'Variables & Types', chapter:1,
    text:'Which is a valid variable name in C?',
    choices:{a:'2ndValue',b:'my value',c:'my_value',d:'float'}, correct:'c',
    explanation:'<code>my_value</code> is valid — underscores are allowed. Variable names cannot start with a digit, contain spaces, or be reserved keywords like <code>float</code>.' },

  { id:'q17', topic:'Variables & Types', chapter:1,
    text:'How many bytes does <code>sizeof(int)</code> typically return on a 32-bit system?',

    choices:{a:'1',b:'2',c:'4',d:'8'}, correct:'c',
    mistakes:{b:'2 bytes (16 bits) was the int size on older 16-bit systems. On modern 32-bit and 64-bit platforms, int is typically 4 bytes. The size is implementation-defined but 4 is standard on virtually all current systems.'},

  { id:'q18', topic:'Control Flow', chapter:1,
    text:'What will <code>printf("%d", 3 + 4 * 2)</code> output?',

    choices:{a:'14',b:'11',c:'10',d:'7'}, correct:'b',
    mistakes:{a:'14 comes from evaluating left to right: (3 + 4) × 2 = 14. C follows standard mathematical operator precedence — multiplication executes before addition, so 4 * 2 is computed first.'},
    explanation:'Multiplication has higher precedence: 4 * 2 = 8, then 3 + 8 = <strong>11</strong>.' },

  { id:'q19', topic:'Control Flow', chapter:1,
    text:'What does the following condition check? <code>if (x > 0 &amp;&amp; y > 0)</code>',

  { id:'q20', topic:'Control Flow', chapter:1,
    text:'Which keyword begins a conditional branch in C?',

    explanation:'C uses <strong>if</strong>, <code>else if</code>, and <code>else</code> for conditional branching.' },

  { id:'q21', topic:'Syntax', chapter:1,
    text:'How do you declare an integer constant named <code>MAX</code> with value 100?',
    choices:{a:'constant int MAX = 100;',b:'const int MAX = 100;',c:'final int MAX = 100;',d:'#define MAX int 100'}, correct:'b',
    mistakes:{a:'<code>constant</code> is not a keyword in C. The correct keyword is <code>const</code> (no "-ant" suffix).',
              c:'<code>final</code> is a Java keyword, not valid in C. The C equivalent of a typed constant is <code>const int MAX = 100;</code>'},
    explanation:'<code>const int MAX = 100;</code> declares a read-only integer. <code>#define MAX 100</code> is also valid but <code>const</code> is type-safe.' },

  { id:'q22', topic:'Variables & Types', chapter:1,
    text:'What is the purpose of <code>return 0;</code> at the end of <code>main()</code>?',
    choices:{a:'Returns 0 to a variable',b:'Signals the program ended successfully',c:'Exits an infinite loop',d:'Clears all variables'}, correct:'b',
    explanation:'<code>return 0</code> from <code>main()</code> tells the operating system the program <strong>completed successfully</strong>. Non-zero values indicate errors.' },

  { id:'q23', topic:'Input / Output', chapter:1,
    text:'Which format specifier prints a <code>float</code> with <code>printf</code>?',
    choices:{a:'%d',b:'%c',c:'%s',d:'%f'}, correct:'d',
    mistakes:{a:'%d is the format specifier for integers (int). Using %d to print a float produces incorrect output — the bit patterns are interpreted as an integer. Use %f for float and double.'},
    explanation:'<code>%f</code> is the format specifier for <strong>float</strong> and <strong>double</strong>. <code>%d</code> is for int, <code>%c</code> for char, <code>%s</code> for strings.' },

  { id:'q24', topic:'Operators', chapter:1,
    text:'Which of these is a <strong>comparison</strong> operator in C?',
    choices:{a:'=',b:'&&',c:'||',d:'=='}, correct:'d',

    text:'C is best described as:',
    choices:{a:'An interpreted, dynamically typed language',b:'A compiled, statically typed language',c:'A markup language',d:'An object-oriented only language'}, correct:'b',
    explanation:'C is a <strong>compiled, statically typed</strong> language. Types must be declared at compile time, and the source code is compiled to machine code before running.' }
